server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Keep this private demo out of search indexes (also via robots.txt + meta tag).
    add_header X-Robots-Tag "noindex, nofollow, nocache" always;

    # SPA fallback — client-side routing serves index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the API to the backend container (same-origin -> no CORS).
    location /api/ {
        proxy_pass http://backend:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        # Critical for SSE: never buffer the event stream.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://backend:8090/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
